<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locali</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px;
      min-height: 200px;
      background: #0f172a;
      color: #f1f5f9;
      direction: rtl;
    }
    .header {
      background: linear-gradient(135deg, #0038b8, #1d5fe8);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-logo { font-size: 18px; font-weight: 700; }
    .header-sub { font-size: 11px; opacity: 0.85; margin-top: 1px; }
    .tabs {
      display: flex;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #94a3b8;
      border: none;
      background: transparent;
      transition: all 0.2s;
    }
    .tab.active {
      color: #0038b8;
      border-bottom: 2px solid #0038b8;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Tab Status ── */
    .status-section { padding: 16px; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #1e293b;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
    }
    .status-dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .status-dot.offline { background: #ef4444; }
    .status-text { font-size: 13px; font-weight: 500; }
    .status-hint { font-size: 11px; color: #64748b; margin-top: 2px; }
    .cmd {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
      font-family: monospace;
      color: #94a3b8;
      width: 100%;
      margin-top: 8px;
    }

    /* ── Tab Inbox ── */
    .inbox-header {
      padding: 12px 16px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .inbox-title { font-size: 13px; font-weight: 600; color: #94a3b8; }
    .inbox-count {
      background: #0038b8;
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
    }
    .inbox-empty {
      padding: 32px 16px;
      text-align: center;
      color: #475569;
      font-size: 12px;
    }
    .inbox-empty .icon { font-size: 32px; margin-bottom: 8px; }

    /* ── Inquiry Card ── */
    .inquiry-card {
      margin: 0 12px 10px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #334155;
    }
    .inquiry-card.answered { border-color: #22c55e44; }
    .inquiry-card.expired { border-color: #ef444422; opacity: 0.7; }

    .inquiry-card-header {
      padding: 10px 12px 6px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .inquiry-store-name {
      font-size: 13px;
      font-weight: 600;
      color: #f1f5f9;
      flex: 1;
    }
    .inquiry-status-chip {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .chip-pending { background: #1d4ed822; color: #60a5fa; border: 1px solid #1d4ed844; }
    .chip-answered { background: #16a34a22; color: #4ade80; border: 1px solid #16a34a44; }
    .chip-expired { background: #7f1d1d22; color: #f87171; border: 1px solid #7f1d1d44; }

    .inquiry-product {
      padding: 0 12px 6px;
      font-size: 11px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Timer bar */
    .inquiry-timer { padding: 6px 12px 10px; }
    .timer-bar-track {
      height: 4px;
      background: #334155;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .timer-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s linear;
    }
    .timer-bar-fill.green { background: #22c55e; }
    .timer-bar-fill.yellow { background: #eab308; }
    .timer-bar-fill.red { background: #ef4444; animation: pulse 1s infinite; }
    .timer-bar-fill.expired { background: #475569; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }

    .timer-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
    }
    .timer-remaining { color: #94a3b8; font-weight: 600; }
    .timer-sent { color: #475569; }

    /* Response */
    .inquiry-response {
      margin: 0 12px 10px;
      padding: 8px 10px;
      background: #0f2b1a;
      border: 1px solid #16a34a44;
      border-radius: 8px;
      font-size: 11px;
      color: #86efac;
      white-space: pre-wrap;
    }
    .inquiry-response-label {
      font-size: 10px;
      font-weight: 700;
      color: #4ade80;
      margin-bottom: 4px;
    }

    /* Card footer */
    .inquiry-card-footer {
      padding: 6px 12px 10px;
      display: flex;
      gap: 6px;
    }
    .btn-dismiss {
      flex: 1;
      padding: 6px;
      background: transparent;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #64748b;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-dismiss:hover { border-color: #ef4444; color: #ef4444; }
    .btn-wa {
      flex: 1;
      padding: 6px;
      background: #16a34a22;
      border: 1px solid #16a34a44;
      border-radius: 6px;
      color: #4ade80;
      font-size: 11px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }

    .refresh-btn {
      background: transparent;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .refresh-btn:hover { color: #f1f5f9; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-logo"><span style="color:#fff;font-weight:900">Loca</span><span style="color:#93b4ff;font-weight:900">li</span></div>
      <div class="header-sub">השוואת מחירים ומציאת חנויות מקומיות</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="status">📡 סטטוס</button>
    <button class="tab" data-tab="inbox">📬 תיבת דואר</button>
  </div>

  <div id="tab-status" class="tab-content active">
    <div class="status-section">
      <div class="status-row">
        <div class="status-dot" id="server-dot"></div>
        <div>
          <div class="status-text" id="server-status">בודק...</div>
          <div class="status-hint" id="server-hint"></div>
        </div>
      </div>
      <div class="cmd">py -3.12 -m uvicorn main:app --reload</div>
    </div>
  </div>

  <div id="tab-inbox" class="tab-content">
    <div class="inbox-header">
      <span class="inbox-title">שאילתות שנשלחו</span>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="inbox-count" id="inbox-count" style="display:none">0</span>
        <button class="refresh-btn" id="refresh-btn" title="רענן">↻</button>
      </div>
    </div>
    <div id="inbox-list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
